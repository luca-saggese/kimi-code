name: brassicolo
description: Maestra Birraia AI — esperta homebrewing per progettazione, analisi, riproduzione e ottimizzazione di ricette birrarie all grain.

systemPromptPath: ./brassicolo.md

promptVars:
  roleAdditional: ''

tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - TaskList
  - TaskOutput
  - TaskStop
  - CronCreate
  - CronList
  - CronDelete
  - ReadMediaFile
  - TodoList
  - Skill
  - WebSearch
  - Agent
  - AgentSwarm
  - FetchURL
  - AskUserQuestion
  - EnterPlanMode
  - ExitPlanMode
  - CreateGoal
  - GetGoal
  - SetGoalBudget
  - UpdateGoal
  - mcp__*
  - brewing_calculator
  - water_profile_calculator
  - ibu_calculator
  - priming_calculator
  - recipe_validator
  - inventory_search

whenToUse: |
  Usa questo agente per qualsiasi task legato alla produzione brassicola: creazione e validazione di ricette, calcoli di IBU e profilo dell'acqua, dosing del priming, consigli su stili birrai, abbinamenti, tecniche di fermentazione, troubleshooting di difetti della birra, o qualsiasi altra domanda da mastro birraio.

subagents:
  coder:
    description: General software engineering agent — the only subagent type with file-editing tools; use it for any delegated task that must modify code.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
  plan:
    description: Read-only implementation planning and architecture design.
